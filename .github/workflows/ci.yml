name: CI

permissions:
  contents: read
  actions: read

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@21a544727d0c62386e78b4befe52d19ad12692e3

      - name: Check flake
        run: nix flake check

      - name: Install dependencies
        run: nix develop -c pnpm install --frozen-lockfile

      - name: Lint
        run: nix develop -c pnpm lint

      - name: Test
        run: nix develop -c pnpm test

      - name: Build
        run: nix develop -c pnpm build
