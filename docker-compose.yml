services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lang_war}
      POSTGRES_USER: ${POSTGRES_USER:-lang_war}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lang_war_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-lang_war} -d $${POSTGRES_DB:-lang_war}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
